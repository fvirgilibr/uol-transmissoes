<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UOL Esporte — Audiência de Transmissões</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root{
    --bg:#0e0e10;--bg2:#18181c;--bg3:#222228;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --text:#f0f0f2;--text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.3);
    --accent:#FF4D00;--radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh}
  .shell{max-width:1100px;margin:0 auto;padding:28px 20px 60px}

  /* LOADING */
  .loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999}
  .spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* LOGIN SCREEN */
  .login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9998}
  .login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:36px 32px;width:min(380px,94vw)}
  .login-logo{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#FF4D00,#ff7a33);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 20px}
  .login-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:4px}
  .login-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:28px}
  .login-error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#f87171;font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:16px;display:none}

  /* HEADER */
  .header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
  .header-left{display:flex;align-items:center;gap:14px}
  .logo{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#FF4D00,#ff7a33);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .header-title{font-size:20px;font-weight:700;letter-spacing:-.3px}
  .header-sub{font-size:13px;color:var(--text2);margin-top:2px}
  .header-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

  .sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:100px;border:1px solid var(--border)}
  .sync-badge.ok{color:#4ade80;border-color:rgba(74,222,128,.25)}
  .sync-badge.loading{color:var(--text3);border-color:var(--border)}
  .sync-badge.err{color:#f87171;border-color:rgba(248,113,113,.25)}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor}

  .user-chip{display:inline-flex;align-items:center;gap:7px;font-size:12px;padding:5px 12px;border-radius:100px;background:var(--bg3);border:1px solid var(--border)}
  .user-chip-role{font-size:10px;padding:1px 7px;border-radius:100px;font-weight:700}
  .role-admin{background:rgba(255,77,0,.2);color:#FF4D00}
  .role-editor{background:rgba(55,138,221,.2);color:#378ADD}

  /* TABS */
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:24px}
  .tab{padding:9px 20px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s;font-family:inherit;letter-spacing:-.01em}
  .tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:600}
  .tab:hover:not(.active){color:var(--text)}

  /* METRICS */
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:24px}
  .metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
  .metric-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .metric-value{font-size:24px;font-weight:700;letter-spacing:-.5px}
  .metric-sub{font-size:11px;color:var(--text3);margin-top:4px}

  .section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  .chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
  .chart-wrap{position:relative;width:100%}

  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  .filter-row input,.filter-row select{height:34px;padding:0 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:inherit;outline:none}
  .filter-row input:focus,.filter-row select:focus{border-color:var(--accent)}
  .filter-row select option{background:var(--bg2)}
  .count-badge{margin-left:auto;font-size:12px;color:var(--text3)}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em}
  td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:var(--bg3)}

  .badge{display:inline-block;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:600}
  .badge-excl{background:rgba(30,150,80,.15);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
  .badge-shared{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--border)}
  .camp-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}

  .btn{height:34px;padding:0 14px;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg3);color:var(--text);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:background .15s}
  .btn:hover{background:rgba(255,255,255,.1)}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  .btn.primary:hover{background:#e64400}
  .btn.sm{height:26px;padding:0 10px;font-size:12px}
  .btn.danger{color:#f87171;border-color:rgba(248,113,113,.2);background:transparent}
  .btn.danger:hover{background:rgba(248,113,113,.08)}
  .btn.ghost{background:transparent;border-color:var(--border)}
  .btn.ghost:hover{background:var(--bg3)}
  .btn:disabled{opacity:.4;cursor:default}

  /* MODAL */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(4px)}
  .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px;width:min(540px,94vw);max-height:90vh;overflow-y:auto}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .modal-title{font-size:16px;font-weight:700}
  .close-btn{width:30px;height:30px;border:1px solid var(--border);background:var(--bg3);border-radius:8px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:18px}
  .close-btn:hover{color:var(--text)}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-group label{font-size:12px;color:var(--text2);font-weight:500}
  .form-group input,.form-group select{height:38px;padding:0 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:inherit;outline:none}
  .form-group input[type=color]{padding:3px 5px;cursor:pointer}
  .form-group input:focus,.form-group select:focus{border-color:var(--accent)}
  .form-group select option{background:var(--bg2)}
  .form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
  .saving-msg{display:none;text-align:center;padding:8px 0;font-size:13px;color:var(--text3)}

  .empty{padding:40px;text-align:center;color:var(--text3);font-size:14px}
  .table-wrap{overflow-x:auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)}

  .legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
  .legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

  .camps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:24px}
  .camp-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px}
  .camp-color-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.15)}
  .camp-card-name{font-size:14px;font-weight:600;flex:1}
  .camp-card-count{font-size:12px;color:var(--text3)}

  .evo-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
  .metric-btn{height:32px;padding:0 16px;font-size:12px;font-weight:600;border:1px solid var(--border2);border-radius:100px;background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit}
  .metric-btn.active{color:#fff;border-color:transparent}
  .metric-btn:hover:not(.active){color:var(--text);border-color:var(--border2)}

  /* USERS PANE */
  .users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .user-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px}
  .user-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--text2);flex-shrink:0}
  .user-email{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .user-meta{font-size:11px;color:var(--text3);margin-top:2px}

  @media(max-width:600px){
    .charts-row{grid-template-columns:1fr}
    .form-grid{grid-template-columns:1fr}
    .header{flex-direction:column}
  }
</style>
</head>
<body>

<div id="loading-screen" class="loading-screen">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--text3)" id="loading-msg">Carregando...</div>
</div>

<!-- LOGIN MODAL -->
<div id="login-screen" class="modal-backdrop" style="display:none" onclick="closeLoginModalBackdrop(event)">
  <div class="login-card">
    <div class="login-logo">📺</div>
    <div class="login-title">Entrar</div>
    <div class="login-sub">Acesso somente para usuários autorizados</div>
    <div id="login-error" class="login-error"></div>
    <div class="form-group" style="margin-bottom:12px">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label>Senha</label>
      <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn primary" style="width:100%;justify-content:center;height:40px;font-size:14px" id="btn-login" onclick="doLogin()">Entrar</button>
    <button class="btn ghost" style="width:100%;justify-content:center;height:36px;font-size:13px;margin-top:8px" id="btn-signup" onclick="doSignup()">Criar conta</button>
  </div>
</div>

<!-- APP -->
<div class="shell" id="app" style="display:none">
  <div class="header">
    <div class="header-left">
      <div class="logo">📺</div>
      <div>
        <div class="header-title">UOL Esporte — Transmissões</div>
        <div class="header-sub">Audiência de lives no YouTube</div>
      </div>
    </div>
    <div class="header-actions">
      <span id="sync-badge" class="sync-badge loading"><span class="sync-dot"></span><span id="sync-text">Conectando...</span></span>
      <button id="btn-login-header" class="btn ghost" onclick="openLoginModal()" style="display:inline-flex">Entrar</button>
      <div id="user-chip" class="user-chip" style="display:none">
        <span id="user-email-label" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
        <span id="user-role-badge" class="user-chip-role"></span>
        <button class="btn sm ghost" style="height:22px;padding:0 8px;font-size:11px;border:none;background:transparent" onclick="doLogout()">Sair</button>
      </div>
      <div id="auth-actions" style="display:none;gap:8px" class="header-actions">
        <button class="btn ghost" onclick="exportData()">⬇ Exportar</button>
        <label class="btn ghost" style="cursor:pointer">⬆ Importar<input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
        <button class="btn ghost" id="btn-new-camp" onclick="openCampModal()">+ Campeonato</button>
        <button class="btn primary" id="btn-new-trans" onclick="openModal()">+ Transmissão</button>

    </div>
  </div>

  <div class="tabs" id="tabs-bar">
    <button class="tab active" onclick="switchTab('dashboard',this)">Dashboard</button>

  <div id="pane-dashboard"></div>
  <div id="pane-evolucao" style="display:none"></div>
  <div id="pane-tabela" style="display:none"></div>
  <div id="pane-campeonatos" style="display:none"></div>
  <div id="pane-usuarios" style="display:none"></div>
</div>

<!-- MODAL TRANSMISSÃO -->
<div id="modal-backdrop" class="modal-backdrop" style="display:none" onclick="closeBackdrop(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Nova transmissão</span>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group" style="grid-column:1/-1">
        <label>Campeonato</label>
        <select id="f-camp"></select>
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>Transmissão (times/evento)</label>
        <input type="text" id="f-trans" placeholder="ex: Flamengo x Palmeiras">
      </div>
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="f-data">
      </div>
      <div class="form-group">
        <label>Exclusivo UOL?</label>
        <select id="f-excl"><option value="Não">Não</option><option value="Sim">Sim</option></select>
      </div>
      <div class="form-group">
        <label>Views</label>
        <input type="number" id="f-views" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label>Pico de ao vivo</label>
        <input type="number" id="f-pico" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label>Novos inscritos</label>

    <div id="modal-saving" class="saving-msg">Salvando...</div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>

</div>

<!-- MODAL CAMPEONATO -->
<div id="camp-modal-backdrop" class="modal-backdrop" style="display:none" onclick="closeCampBackdrop(event)">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <span class="modal-title" id="camp-modal-title">Novo campeonato</span>
      <button class="close-btn" onclick="closeCampModal()">×</button>
    </div>
    <div class="form-grid" style="grid-template-columns:1fr">
      <div class="form-group">
        <label>Nome do campeonato</label>
        <input type="text" id="fc-nome" placeholder="ex: Copa Sul-Americana">
      </div>
      <div class="form-group">
        <label>Cor identificadora</label>
        <input type="color" id="fc-cor" value="#378ADD">
      </div>
    </div>
    <div id="camp-saving" class="saving-msg">Salvando...</div>
    <div class="form-actions">
      <button class="btn" onclick="closeCampModal()">Cancelar</button>
      <button class="btn primary" id="btn-save-camp" onclick="saveCamp()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL NOVO USUÁRIO (admin) -->
<div id="user-modal-backdrop" class="modal-backdrop" style="display:none" onclick="closeUserBackdrop(event)">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <span class="modal-title">Novo usuário</span>
      <button class="close-btn" onclick="closeUserModal()">×</button>
    </div>
    <div class="form-grid" style="grid-template-columns:1fr">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="nu-email" placeholder="usuario@email.com">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="nu-password" placeholder="mínimo 6 caracteres">
      </div>
      <div class="form-group">
        <label>Perfil</label>
        <select id="nu-role">
          <option value="false">Editor</option>
          <option value="true">Admin</option>
        </select>
      </div>
    </div>
    <div id="user-saving" class="saving-msg">Criando usuário...</div>
    <div id="user-error" class="login-error" style="margin-top:12px"></div>
    <div class="form-actions">
      <button class="btn" onclick="closeUserModal()">Cancelar</button>
      <button class="btn primary" id="btn-save-user" onclick="saveNewUser()">Criar usuário</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SB_URL = 'https://ucnooobcuhywylwpntel.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVjbm9vb2JjdWh5d3lsd3BudGVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NTY2MjEsImV4cCI6MjA5MjIzMjYyMX0.Nssa-HQSBLeWaQUUpAT5g5og_D89loab9KNEdhQaCas';

// ─── STATE ────────────────────────────────────────────────────────────────────
let data=[], camps=[], chartInstances={};
let editId=null, editCampNome=null, activeTab='dashboard', evoMetric='views';
let currentUser=null, currentProfile=null, accessToken=null;

const STORAGE_KEY='uol_esporte_transmissoes_v1';
const CAMPS_KEY='uol_esporte_campeonatos_v1';
const SESSION_KEY='uol_esporte_session';

const DEFAULT_CAMPS=[
  {nome:'Libertadores Sub-20',cor:'#378ADD'},{nome:'NBB',cor:'#63a022'},
  {nome:'LBF',cor:'#e09020'},{nome:'Sul-Americana',cor:'#D4537E'},
  {nome:'Copa do Brasil',cor:'#7F77DD'},{nome:'Brasileirão',cor:'#1D9E75'},
];

// ─── AUTH HEADERS ─────────────────────────────────────────────────────────────
function getHeaders(extra={}){
  const h={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+(accessToken||SB_KEY)};
  return {...h,...extra};
}

// ─── SUPABASE FETCH ───────────────────────────────────────────────────────────
async function sbFetch(path,options={}){
  const method=options.method||'GET';
  const isDelete=method==='DELETE';
  const res=await fetch(SB_URL+'/rest/v1/'+path,{
    ...options,
    headers:{...getHeaders(),...(isDelete?{'Prefer':'return=minimal'}:{}),...(options.headers||{})}
  });
  if(!res.ok){const err=await res.text();throw new Error(err);}
  if(isDelete||res.status===204) return [];
  const text=await res.text();
  return text?JSON.parse(text):[];
}

async function sbAuth(path,body){
  const res=await fetch(SB_URL+'/auth/v1/'+path,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SB_KEY},
    body:JSON.stringify(body)
  });
  const json=await res.json();
  if(!res.ok) throw new Error(json.error_description||json.message||'Erro de autenticação');
  return json;
}

// ─── SESSION ──────────────────────────────────────────────────────────────────
function saveSession(session){
  try{localStorage.setItem(SESSION_KEY,JSON.stringify(session));}catch(e){}
}
function loadSession(){
  try{const s=localStorage.getItem(SESSION_KEY);return s?JSON.parse(s):null;}catch(e){return null;}
}
function clearSession(){
  try{localStorage.removeItem(SESSION_KEY);}catch(e){}
}

// ─── LOGIN / LOGOUT ───────────────────────────────────────────────────────────
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  const errEl=document.getElementById('login-error');
  const btn=document.getElementById('btn-login');
  errEl.style.display='none';
  if(!email||!password){errEl.textContent='Preencha e-mail e senha.';errEl.style.display='block';return;}
  btn.disabled=true;btn.textContent='Entrando...';
  try{
    const res=await sbAuth('token?grant_type=password',{email,password});
    accessToken=res.access_token;
    currentUser=res.user;
    saveSession({access_token:res.access_token,refresh_token:res.refresh_token,user:res.user});
    await afterLogin();
  }catch(e){
    errEl.textContent=e.message==='Invalid login credentials'?'E-mail ou senha incorretos.':e.message;
    errEl.style.display='block';
  }
  btn.disabled=false;btn.textContent='Entrar';
}

async function doSignup(){
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  const errEl=document.getElementById('login-error');
  errEl.style.display='none';
  if(!email||!password){errEl.textContent='Preencha e-mail e senha.';errEl.style.display='block';return;}
  const btn=document.getElementById('btn-signup');
  btn.disabled=true;btn.textContent='Criando...';
  try{
    const res=await sbAuth('signup',{email,password});
    accessToken=res.access_token;
    currentUser=res.user;
    saveSession({access_token:res.access_token,refresh_token:res.refresh_token,user:res.user});
    await afterLogin();
  }catch(e){
    errEl.textContent=e.message;errEl.style.display='block';
  }
  btn.disabled=false;btn.textContent='Criar conta';
}

async function doLogout(){
  try{await fetch(SB_URL+'/auth/v1/logout',{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+accessToken}});}catch(e){}
  accessToken=null;currentUser=null;currentProfile=null;

  document.getElementById('auth-actions').style.display='none';
  document.getElementById('btn-login-header').style.display='inline-flex';
  document.getElementById('tab-usuarios').style.display='none';

}
function openLoginModal(){

  document.getElementById('btn-login').disabled=false;
  document.getElementById('btn-login').textContent='Entrar';

function closeLoginModal(){document.getElementById('login-screen').style.display='none';}
function closeLoginModalBackdrop(e){if(e.target===document.getElementById('login-screen'))closeLoginModal();}

async function afterLogin(){
  document.getElementById('login-screen').style.display='none';
  try{const profiles=await sbFetch('profiles?id=eq.'+currentUser.id);currentProfile=profiles[0]||{is_admin:false};}catch(e){currentProfile={is_admin:false};}

}

function applyAuthUI(){

  document.getElementById('btn-login-header').style.display='none';

// ─── DATA LOAD ────────────────────────────────────────────────────────────────
async function loadData(){
  setSyncStatus('loading','Carregando...');
  try{
    const [rows,campRows]=await Promise.all([
      sbFetch('transmissoes?select=*&order=data.asc,id.asc'),
      sbFetch('campeonatos?select=*&order=nome.asc')
    ]);
    data=rows.map(r=>({id:r.id,camp:r.camp,trans:r.trans,data:r.data,views:r.views,pico:r.pico,exclusivo:r.exclusivo,inscritos:r.inscritos}));
    camps=campRows.length?campRows.map(r=>({nome:r.nome,cor:r.cor})):DEFAULT_CAMPS.map(c=>({...c}));
    if(campRows.length===0) await seedCamps();
    if(data.length===0) await seedTransmissoes();
    cacheData();cacheCamps();
    setSyncStatus('ok','Sincronizado');
  }catch(e){
    console.error('loadData error:',e);
    setSyncStatus('err','Offline — usando cache');
    try{const r=localStorage.getItem(STORAGE_KEY);if(r)data=JSON.parse(r);}catch(e2){}
    try{const r=localStorage.getItem(CAMPS_KEY);if(r)camps=JSON.parse(r);}catch(e2){}
    if(!camps.length)camps=DEFAULT_CAMPS.map(c=>({...c}));
  }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function fmt(n){return Number(n).toLocaleString('pt-BR');}
function fmtK(n){return n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':fmt(n);}
function getCampColor(nome){const c=camps.find(c=>c.nome===nome);return c?c.cor:autoColor(nome);}
function autoColor(nome){const hues=[210,140,30,330,260,170,50,300];let h=0;for(let i=0;i<nome.length;i++)h=(h+nome.charCodeAt(i))%hues.length;return`hsl(${hues[h]},55%,55%)`;}
function destroyCharts(){Object.values(chartInstances).forEach(c=>{try{c.destroy();}catch(e){}});chartInstances={};}
function cacheData(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){}}
function cacheCamps(){try{localStorage.setItem(CAMPS_KEY,JSON.stringify(camps));}catch(e){}}
function setSyncStatus(state,msg){const b=document.getElementById('sync-badge');const t=document.getElementById('sync-text');if(!b)return;b.className='sync-badge '+state;t.textContent=msg;}
function refreshCurrentTab(){if(activeTab==='dashboard')renderDashboard();else if(activeTab==='evolucao')renderEvolucao();else if(activeTab==='tabela')renderTabela();else if(activeTab==='campeonatos')renderCampeonatos();else renderUsuarios();}
const gridColor='rgba(255,255,255,0.06)',tickColor='rgba(255,255,255,0.4)';
const metricLabels={views:'Views',pico:'Pico ao vivo',inscritos:'Novos inscritos'};

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDashboard(){
  destroyCharts();
  const total=data.reduce((a,d)=>a+d.views,0);
  const totalPico=data.reduce((a,d)=>a+d.pico,0);
  const totalInscr=data.reduce((a,d)=>a+d.inscritos,0);
  const avgViews=data.length?Math.round(total/data.length):0;
  const maxView=data.length?data.reduce((a,d)=>d.views>a.views?d:a,data[0]):null;
  const campNames=[...new Set(data.map(d=>d.camp))].sort();
  const bycamp={};
  campNames.forEach(c=>{bycamp[c]={views:0,pico:0,n:0};});
  data.forEach(d=>{bycamp[d.camp].views+=d.views;bycamp[d.camp].pico+=d.pico;bycamp[d.camp].n++;});
  campNames.forEach(c=>{bycamp[c].picoMedia=bycamp[c].n?Math.round(bycamp[c].pico/bycamp[c].n):0;});
  const cs=[...campNames].sort((a,b)=>bycamp[b].views-bycamp[a].views);
  const top5=[...data].sort((a,b)=>b.views-a.views).slice(0,5);
  const byDate={};data.forEach(d=>{byDate[d.data]=(byDate[d.data]||0)+d.views;});
  const dates=Object.keys(byDate).sort();
  const vcH=Math.max(180,cs.length*44+40);

  document.getElementById('pane-dashboard').innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="metric-label">Transmissões</div><div class="metric-value">${data.length}</div></div>
      <div class="metric"><div class="metric-label">Total de views</div><div class="metric-value">${fmtK(total)}</div></div>
      <div class="metric"><div class="metric-label">Pico médio ao vivo</div><div class="metric-value">${fmtK(data.length?Math.round(totalPico/data.length):0)}</div></div>
      <div class="metric"><div class="metric-label">Média de views/live</div><div class="metric-value">${fmtK(avgViews)}</div></div>
      <div class="metric"><div class="metric-label">Novos inscritos</div><div class="metric-value">${fmt(totalInscr)}</div></div>
      <div class="metric"><div class="metric-label">Maior live</div><div class="metric-value" style="font-size:13px;line-height:1.4;margin-top:4px">${maxView?maxView.trans:'-'}</div><div class="metric-sub">${maxView?fmtK(maxView.views)+' views':''}</div></div>
    </div>
    <div class="charts-row">
      <div class="chart-card" style="margin-bottom:0"><div class="section-title">Views totais por campeonato</div><div class="chart-wrap" style="height:${vcH}px"><canvas id="c-vc" role="img" aria-label="Views por campeonato"></canvas></div></div>
      <div class="chart-card" style="margin-bottom:0"><div class="section-title">Pico médio ao vivo por campeonato</div><div class="chart-wrap" style="height:${vcH}px"><canvas id="c-pc" role="img" aria-label="Pico médio"></canvas></div></div>
    </div>
    <div style="margin-bottom:16px"></div>
    <div class="chart-card"><div class="section-title">Top 5 transmissões — views</div><div class="chart-wrap" style="height:${top5.length*46+40}px"><canvas id="c-t5" role="img" aria-label="Top 5"></canvas></div></div>
    <div class="chart-card"><div class="section-title">Views acumulados por data</div><div class="chart-wrap" style="height:210px"><canvas id="c-tl" role="img" aria-label="Timeline"></canvas></div></div>
  `;
  const barOpts=(suffix)=>({indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${fmt(ctx.raw)} ${suffix}`}}},scales:{x:{ticks:{color:tickColor,font:{size:11},callback:v=>fmtK(v)},grid:{color:gridColor}},y:{ticks:{color:tickColor,font:{size:12}},grid:{display:false}}}});
  chartInstances.vc=new Chart(document.getElementById('c-vc'),{type:'bar',data:{labels:cs,datasets:[{data:cs.map(c=>bycamp[c].views),backgroundColor:cs.map(getCampColor),borderRadius:4}]},options:barOpts('views')});
  chartInstances.pc=new Chart(document.getElementById('c-pc'),{type:'bar',data:{labels:cs,datasets:[{data:cs.map(c=>bycamp[c].picoMedia),backgroundColor:cs.map(getCampColor),borderRadius:4}]},options:barOpts('pico médio')});
  chartInstances.t5=new Chart(document.getElementById('c-t5'),{type:'bar',data:{labels:top5.map(d=>d.trans.length>35?d.trans.slice(0,33)+'…':d.trans),datasets:[{data:top5.map(d=>d.views),backgroundColor:top5.map(d=>getCampColor(d.camp)),borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${fmt(ctx.raw)} views`}}},scales:{x:{ticks:{color:tickColor,font:{size:11},callback:v=>fmtK(v)},grid:{color:gridColor}},y:{ticks:{color:tickColor,font:{size:12}},grid:{display:false}}}}});
  chartInstances.tl=new Chart(document.getElementById('c-tl'),{type:'bar',data:{labels:dates.map(d=>{const[y,m,day]=d.split('-');return`${day}/${m}`;}),datasets:[{data:dates.map(d=>byDate[d]),backgroundColor:'#378ADD',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${fmt(ctx.raw)} views`}}},scales:{x:{ticks:{color:tickColor,font:{size:11},autoSkip:false,maxRotation:45},grid:{display:false}},y:{ticks:{color:tickColor,font:{size:11},callback:v=>fmtK(v)},grid:{color:gridColor}}}}});

// ─── EVOLUÇÃO ─────────────────────────────────────────────────────────────────
function renderEvolucao(){
  destroyCharts();
  const campNames=[...new Set(data.map(d=>d.camp))].sort();
  if(!campNames.length){document.getElementById('pane-evolucao').innerHTML=`<div class="empty">Nenhuma transmissão cadastrada ainda.</div>`;return;}
  const mk=evoMetric;
  const allDates=[...new Set(data.map(d=>d.data))].sort();
  const dateLabels=allDates.map(d=>{const[y,m,day]=d.split('-');return`${day}/${m}`;});
  function makeCampDatasets(){return campNames.map(camp=>{const byDate={};data.filter(d=>d.camp===camp).forEach(d=>{byDate[d.data]=(byDate[d.data]||0)+d[mk];});return{label:camp,data:allDates.map(dt=>byDate[dt]??null),borderColor:getCampColor(camp),backgroundColor:getCampColor(camp)+'33',tension:.35,pointRadius:5,pointHoverRadius:7,spanGaps:false,fill:false};});}
  function makeCumDatasets(){return campNames.map(camp=>{const byDate={};data.filter(d=>d.camp===camp).forEach(d=>{byDate[d.data]=(byDate[d.data]||0)+d[mk];});let cum=0;return{label:camp,data:allDates.map(dt=>{cum+=(byDate[dt]||0);return cum;}),borderColor:getCampColor(camp),backgroundColor:getCampColor(camp)+'22',tension:.35,pointRadius:4,fill:false};});}
  const metricBtns=['views','pico','inscritos'].map(m=>`<button class="metric-btn${evoMetric===m?' active':''}" style="${evoMetric===m?'background:'+getCampColor(campNames[0])+';':''}" onclick="setEvoMetric('${m}')">${metricLabels[m]}</button>`).join('');
  const legendHtml=campNames.map(c=>`<div class="legend-item"><div class="legend-dot" style="background:${getCampColor(c)}"></div>${c}</div>`).join('');
  const perCampHtml=campNames.map((camp,idx)=>{const rows=data.filter(d=>d.camp===camp).sort((a,b)=>a.data.localeCompare(b.data));return`<div class="chart-card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="width:10px;height:10px;border-radius:50%;background:${getCampColor(camp)};display:inline-block;flex-shrink:0"></span><div class="section-title" style="margin-bottom:0">${camp}</div><span style="font-size:11px;color:var(--text3);margin-left:auto">${rows.length} live(s) · total: ${fmtK(rows.reduce((a,d)=>a+d[mk],0))}</span></div><div class="chart-wrap" style="height:200px"><canvas id="c-camp-${idx}" role="img" aria-label="${camp}"></canvas></div></div>`;}).join('');
  document.getElementById('pane-evolucao').innerHTML=`
    <div class="evo-controls"><span style="font-size:12px;color:var(--text3);margin-right:4px">Métrica:</span>${metricBtns}</div>
    <div class="chart-card"><div class="section-title">${metricLabels[mk]} por transmissão — comparativo</div><div class="legend">${legendHtml}</div><div class="chart-wrap" style="height:290px"><canvas id="c-evo-all" role="img" aria-label="Comparativo"></canvas></div></div>
    <div class="chart-card"><div class="section-title">${metricLabels[mk]} acumulado por campeonato</div><div class="legend">${legendHtml}</div><div class="chart-wrap" style="height:260px"><canvas id="c-evo-cum" role="img" aria-label="Acumulado"></canvas></div></div>
    <div class="section-title" style="margin-bottom:16px">Detalhe por campeonato — ${metricLabels[mk]}</div>${perCampHtml}
  `;
  const lineOpts={responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${fmt(ctx.raw??0)}`}}},scales:{x:{ticks:{color:tickColor,font:{size:11},autoSkip:false,maxRotation:45},grid:{display:false}},y:{ticks:{color:tickColor,font:{size:11},callback:v=>fmtK(v)},grid:{color:gridColor}}}};
  chartInstances['ea']=new Chart(document.getElementById('c-evo-all'),{type:'line',data:{labels:dateLabels,datasets:makeCampDatasets()},options:lineOpts});
  chartInstances['ec']=new Chart(document.getElementById('c-evo-cum'),{type:'line',data:{labels:dateLabels,datasets:makeCumDatasets()},options:lineOpts});
  campNames.forEach((camp,idx)=>{
    const rows=data.filter(d=>d.camp===camp).sort((a,b)=>a.data.localeCompare(b.data));
    const labels=rows.map(d=>{const[y,m,day]=d.data.split('-');return`${day}/${m}`;});
    const color=getCampColor(camp);
    chartInstances[`cp${idx}`]=new Chart(document.getElementById(`c-camp-${idx}`),{type:'line',data:{labels,datasets:[{label:metricLabels[mk],data:rows.map(d=>d[mk]),borderColor:color,backgroundColor:color+'22',borderWidth:2,pointRadius:5,pointHoverRadius:7,tension:.35,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:ctx=>{const r=rows[ctx[0].dataIndex];return r.trans+' ('+labels[ctx[0].dataIndex]+')';},label:ctx=>` ${fmt(ctx.raw)}`}}},scales:{x:{ticks:{color:tickColor,font:{size:11},autoSkip:false,maxRotation:45},grid:{display:false}},y:{ticks:{color:tickColor,font:{size:11},callback:v=>fmtK(v)},grid:{color:gridColor}}}}});
  });
}

// ─── TABELA ───────────────────────────────────────────────────────────────────

          <td style="font-weight:500;max-width:200px">${d.trans}</td>
          <td style="text-align:right;font-variant-numeric:tabular-nums">${fmt(d.views)}</td>
          <td style="text-align:right;font-variant-numeric:tabular-nums">${fmt(d.pico)}</td>
          <td><span class="badge ${d.exclusivo==='Sim'?'badge-excl':'badge-shared'}">${d.exclusivo}</span></td>
          <td style="text-align:right;font-variant-numeric:tabular-nums">${fmt(d.inscritos)}</td>
          ${isAuth?`<td style="white-space:nowrap;display:flex;gap:4px"><button class="btn sm" onclick="editEntry(${d.id})">Editar</button><button class="btn sm danger" onclick="deleteEntry(${d.id})">Excluir</button></td>`:''}
        </tr>`;}).join('')}
      </tbody>
    </table></div>
  `;
  document.getElementById('ft-text').addEventListener('input',e=>{tableState.text=e.target.value;renderTabela();});
  document.getElementById('ft-camp').addEventListener('change',e=>{tableState.camp=e.target.value;renderTabela();});
  document.getElementById('ft-excl').addEventListener('change',e=>{tableState.excl=e.target.value;renderTabela();});
}

// ─── CAMPEONATOS ──────────────────────────────────────────────────────────────
function renderCampeonatos(){
  const isAuth=!!currentUser;
  const counts={};data.forEach(d=>{counts[d.camp]=(counts[d.camp]||0)+1;});
  const cardsHtml=camps.map(c=>`
    <div class="camp-card">
      <div class="camp-color-dot" style="background:${c.cor}"></div>
      <div style="flex:1"><div class="camp-card-name">${c.nome}</div><div class="camp-card-count">${counts[c.nome]||0} transmissão(ões)</div></div>
      ${isAuth?`<div style="display:flex;gap:6px"><button class="btn sm" onclick="editCamp('${c.nome.replace(/'/g,"\\'")}')">Editar cor</button><button class="btn sm danger" onclick="deleteCamp('${c.nome.replace(/'/g,"\\'")}')">×</button></div>`:''}
    </div>`).join('');
  document.getElementById('pane-campeonatos').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="section-title" style="margin-bottom:0">${camps.length} campeonato(s)</div>
      ${isAuth?'<button class="btn primary" onclick="openCampModal()">+ Novo campeonato</button>':''}
    </div>
    <div class="camps-grid">${cardsHtml||'<div class="empty">Nenhum campeonato cadastrado.</div>'}</div>
  `;
}

// ─── USUÁRIOS (admin) ─────────────────────────────────────────────────────────
async function renderUsuarios(){
  document.getElementById('pane-usuarios').innerHTML=`<div class="empty"><div class="spinner" style="margin:0 auto 12px"></div>Carregando usuários...</div>`;
  let profiles=[];
  try{profiles=await sbFetch('profiles?select=*&order=created_at.asc');}catch(e){console.error(e);}
  const cardsHtml=profiles.map(p=>{
    const initials=p.email?p.email[0].toUpperCase():'?';
    const isMe=p.id===currentUser?.id;
    const dt=p.created_at?new Date(p.created_at).toLocaleDateString('pt-BR'):'';
    return`<div class="user-card">
      <div class="user-avatar">${initials}</div>
      <div style="flex:1;min-width:0">
        <div class="user-email">${p.email||'—'}</div>
        <div class="user-meta">${dt}${isMe?' · você':''}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
        <span class="user-chip-role ${p.is_admin?'role-admin':'role-editor'}">${p.is_admin?'Admin':'Editor'}</span>
        ${!isMe?`<button class="btn sm danger" style="margin-top:4px" onclick="deleteUser('${p.id}','${p.email}')">Remover</button>`:''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('pane-usuarios').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="section-title" style="margin-bottom:0">${profiles.length} usuário(s)</div>
      <button class="btn primary" onclick="openUserModal()">+ Novo usuário</button>
    </div>
    <div class="users-grid">${cardsHtml||'<div class="empty">Nenhum usuário encontrado.</div>'}</div>
  `;
}

async function saveNewUser(){
  const email=document.getElementById('nu-email').value.trim();
  const password=document.getElementById('nu-password').value;
  const isAdmin=document.getElementById('nu-role').value==='true';
  const errEl=document.getElementById('user-error');
  errEl.style.display='none';
  if(!email||!password){errEl.textContent='Preencha e-mail e senha.';errEl.style.display='block';return;}
  if(password.length<6){errEl.textContent='A senha precisa ter pelo menos 6 caracteres.';errEl.style.display='block';return;}
  document.getElementById('user-saving').style.display='block';
  document.getElementById('btn-save-user').disabled=true;
  try{
    // create user via admin API (service role needed — use signup instead)
    const res=await sbAuth('signup',{email,password});
    // set is_admin via profiles upsert
    if(isAdmin){
      await sbFetch('profiles?id=eq.'+res.user.id,{method:'PATCH',body:JSON.stringify({is_admin:true})});
    }
    closeUserModal();
    renderUsuarios();
  }catch(e){
    errEl.textContent=e.message;
    errEl.style.display='block';
  }
  document.getElementById('user-saving').style.display='none';
  document.getElementById('btn-save-user').disabled=false;
}

async function deleteUser(id,email){
  if(!confirm(`Remover o usuário ${email}?`)) return;
  try{
    await sbFetch('profiles?id=eq.'+id,{method:'DELETE'});
    renderUsuarios();
  }catch(e){alert('Erro ao remover: '+e.message);}
}

function openUserModal(){
  document.getElementById('nu-email').value='';
  document.getElementById('nu-password').value='';
  document.getElementById('nu-role').value='false';
  document.getElementById('user-error').style.display='none';
  document.getElementById('user-saving').style.display='none';
  document.getElementById('btn-save-user').disabled=false;
  document.getElementById('user-modal-backdrop').style.display='flex';
}
function closeUserModal(){document.getElementById('user-modal-backdrop').style.display='none';}
function closeUserBackdrop(e){if(e.target===document.getElementById('user-modal-backdrop'))closeUserModal();}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab,el){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['dashboard','evolucao','tabela','campeonatos','usuarios'].forEach(p=>{document.getElementById('pane-'+p).style.display=p===tab?'':'none';});
  refreshCurrentTab();
}

// ─── MODAL TRANSMISSÃO ────────────────────────────────────────────────────────
function openModal(id=null){
  editId=id;
  const sel=document.getElementById('f-camp');
  sel.innerHTML=camps.map(c=>`<option value="${c.nome}">${c.nome}</option>`).join('');
  document.getElementById('modal-title').textContent=id?'Editar transmissão':'Nova transmissão';
  if(id){
    const d=data.find(x=>x.id===id);
    if(d){sel.value=d.camp;document.getElementById('f-trans').value=d.trans;document.getElementById('f-data').value=d.data;document.getElementById('f-excl').value=d.exclusivo;document.getElementById('f-views').value=d.views;document.getElementById('f-pico').value=d.pico;document.getElementById('f-inscritos').value=d.inscritos;}
  }else{
    document.getElementById('f-trans').value='';document.getElementById('f-data').value=new Date().toISOString().slice(0,10);
    document.getElementById('f-excl').value='Não';document.getElementById('f-views').value='';document.getElementById('f-pico').value='';document.getElementById('f-inscritos').value='';
  }
  document.getElementById('modal-saving').style.display='none';
  document.getElementById('btn-save-entry').disabled=false;
  document.getElementById('modal-backdrop').style.display='flex';
}
function closeModal(){document.getElementById('modal-backdrop').style.display='none';}
function closeBackdrop(e){if(e.target===document.getElementById('modal-backdrop'))closeModal();}

async function saveEntry(){
  const camp=document.getElementById('f-camp').value;
  const trans=document.getElementById('f-trans').value.trim();
  const dt=document.getElementById('f-data').value;
  const excl=document.getElementById('f-excl').value;
  const views=parseInt(document.getElementById('f-views').value)||0;
  const pico=parseInt(document.getElementById('f-pico').value)||0;
  const inscritos=parseInt(document.getElementById('f-inscritos').value)||0;
  if(!camp||!trans||!dt){alert('Preencha campeonato, transmissão e data.');return;}
  document.getElementById('modal-saving').style.display='block';
  document.getElementById('btn-save-entry').disabled=true;
  setSyncStatus('loading','Salvando...');
  try{
    if(editId){
      await sbFetch(`transmissoes?id=eq.${editId}`,{method:'PATCH',body:JSON.stringify({camp,trans,data:dt,exclusivo:excl,views,pico,inscritos})});
      const idx=data.findIndex(d=>d.id===editId);
      if(idx>=0)data[idx]={id:editId,camp,trans,data:dt,exclusivo:excl,views,pico,inscritos};
    }else{
      const rows=await sbFetch('transmissoes',{method:'POST',body:JSON.stringify({camp,trans,data:dt,exclusivo:excl,views,pico,inscritos})});
      data.push({id:rows[0].id,camp,trans,data:dt,exclusivo:excl,views,pico,inscritos});
    }
    cacheData();setSyncStatus('ok','Sincronizado');
  }catch(e){
    console.error('saveEntry error:',e);
    if(editId){const idx=data.findIndex(d=>d.id===editId);if(idx>=0)data[idx]={...data[idx],camp,trans,data:dt,exclusivo:excl,views,pico,inscritos};}
    else{const newId=Math.max(0,...data.map(d=>d.id))+1;data.push({id:newId,camp,trans,data:dt,exclusivo:excl,views,pico,inscritos});}
    cacheData();setSyncStatus('err','Salvo offline');
  }
  closeModal();refreshCurrentTab();
}
function editEntry(id){openModal(id);}
async function deleteEntry(id){
  const d=data.find(x=>x.id===id);
  if(!d||!confirm(`Excluir "${d.trans}"?`))return;
  setSyncStatus('loading','Excluindo...');
  try{await sbFetch(`transmissoes?id=eq.${id}`,{method:'DELETE'});setSyncStatus('ok','Sincronizado');}
  catch(e){console.error(e);setSyncStatus('err','Erro ao excluir');}
  data=data.filter(x=>x.id!==id);cacheData();renderTabela();
}

// ─── MODAL CAMPEONATO ─────────────────────────────────────────────────────────
function openCampModal(nome=null){
  editCampNome=nome;
  document.getElementById('camp-modal-title').textContent=nome?'Editar campeonato':'Novo campeonato';
  if(nome){const c=camps.find(x=>x.nome===nome);document.getElementById('fc-nome').value=nome;document.getElementById('fc-nome').disabled=true;document.getElementById('fc-cor').value=c?c.cor:'#378ADD';}
  else{document.getElementById('fc-nome').value='';document.getElementById('fc-nome').disabled=false;document.getElementById('fc-cor').value='#378ADD';}
  document.getElementById('camp-saving').style.display='none';
  document.getElementById('btn-save-camp').disabled=false;
  document.getElementById('camp-modal-backdrop').style.display='flex';
}
function closeCampModal(){document.getElementById('camp-modal-backdrop').style.display='none';}
function closeCampBackdrop(e){if(e.target===document.getElementById('camp-modal-backdrop'))closeCampModal();}
function editCamp(nome){openCampModal(nome);}

async function deleteCamp(nome){
  const used=data.some(d=>d.camp===nome);
  if(!confirm(used?`O campeonato "${nome}" tem transmissões. Excluir mesmo assim?`:`Excluir "${nome}"?`))return;
  setSyncStatus('loading','Excluindo...');
  try{
    await fetch(SB_URL+'/rest/v1/campeonatos?nome=eq.'+encodeURIComponent(nome),{method:'DELETE',headers:{apikey:SB_KEY,'Authorization':'Bearer '+accessToken,'Prefer':'return=minimal'}});
    setSyncStatus('ok','Sincronizado');
  }catch(e){console.error(e);setSyncStatus('err','Erro ao excluir');}
  camps=camps.filter(c=>c.nome!==nome);cacheCamps();renderCampeonatos();
}

async function saveCamp(){
  const nome=document.getElementById('fc-nome').value.trim();
  const cor=document.getElementById('fc-cor').value;
  if(!nome){alert('Digite o nome do campeonato.');return;}
  document.getElementById('camp-saving').style.display='block';
  document.getElementById('btn-save-camp').disabled=true;
  setSyncStatus('loading','Salvando...');
  try{
    if(editCampNome){
      await sbFetch(`campeonatos?nome=eq.${encodeURIComponent(editCampNome)}`,{method:'PATCH',body:JSON.stringify({cor})});
      const idx=camps.findIndex(c=>c.nome===editCampNome);if(idx>=0)camps[idx].cor=cor;
    }else{
      if(camps.find(c=>c.nome===nome)){alert('Esse campeonato já existe.');document.getElementById('camp-saving').style.display='none';document.getElementById('btn-save-camp').disabled=false;return;}
      await sbFetch('campeonatos',{method:'POST',body:JSON.stringify({nome,cor})});
      camps.push({nome,cor});
    }
    cacheCamps();setSyncStatus('ok','Sincronizado');
  }catch(e){
    if(editCampNome){const idx=camps.findIndex(c=>c.nome===editCampNome);if(idx>=0)camps[idx].cor=cor;}
    else if(!camps.find(c=>c.nome===nome))camps.push({nome,cor});
    cacheCamps();setSyncStatus('err','Salvo offline');
  }
  closeCampModal();renderCampeonatos();
}

// ─── EXPORT / IMPORT ─────────────────────────────────────────────────────────
function exportData(){
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify({data,camps},null,2));
  a.download='uol-esporte-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
async function importData(e){
  if(!currentUser){alert('Faça login para importar dados.');return;}
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const parsed=JSON.parse(ev.target.result);
      if(!parsed.data||!Array.isArray(parsed.data)){alert('Arquivo inválido.');return;}
      if(!confirm('Isso vai substituir todos os dados no banco. Continuar?'))return;
      setSyncStatus('loading','Importando...');
      await sbFetch('transmissoes?id=gt.0',{method:'DELETE'}).catch(()=>{});
      await sbFetch('campeonatos?nome=neq.__none__',{method:'DELETE'}).catch(()=>{});
      if(parsed.camps?.length)await sbFetch('campeonatos',{method:'POST',body:JSON.stringify(parsed.camps.map(c=>({nome:c.nome,cor:c.cor})))}).catch(()=>{});
      const rows=parsed.data.map(d=>({camp:d.camp,trans:d.trans,data:d.data,views:d.views,pico:d.pico,exclusivo:d.exclusivo,inscritos:d.inscritos}));
      const inserted=await sbFetch('transmissoes',{method:'POST',body:JSON.stringify(rows)});
      data=inserted.map(r=>({id:r.id,camp:r.camp,trans:r.trans,data:r.data,views:r.views,pico:r.pico,exclusivo:r.exclusivo,inscritos:r.inscritos}));
      camps=parsed.camps||DEFAULT_CAMPS.map(c=>({...c}));
      cacheData();cacheCamps();setSyncStatus('ok','Importado');
      refreshCurrentTab();alert('Dados importados com sucesso!');
    }catch(err){alert('Erro ao importar: '+err.message);setSyncStatus('err','Erro na importação');}
  };
  reader.readAsText(file);e.target.value='';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  // try to restore session
  const saved=loadSession();
  if(saved?.access_token){
    try{
      const res=await fetch(SB_URL+'/auth/v1/user',{headers:{apikey:SB_KEY,'Authorization':'Bearer '+saved.access_token}});
      if(res.ok){
        const user=await res.json();
        accessToken=saved.access_token;
        currentUser=user;
        try{const profiles=await sbFetch('profiles?id=eq.'+currentUser.id);currentProfile=profiles[0]||{is_admin:false};}catch(e){currentProfile={is_admin:false};}
        applyAuthUI();
      } else { clearSession(); }
    }catch(e){ clearSession(); }
  }
  // always load data and show app (public read)
  await loadData();
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='';
  renderDashboard();
}
init();
</script>
